<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Dashboard GOMA</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>

body{
    font-family:Arial,Helvetica,sans-serif;
    margin:20px;
    background:#d4a017;
}

h2{
    margin-bottom:20px;
}

#estado{
    margin-bottom:15px;
    font-weight:bold;
    color:#444;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
}

th{
    background:#dddddd;
    position:sticky;
    top:0;
}

th,td{
    border:1px solid #ccc;
    padding:6px;
    font-size:13px;
    text-align:center;
    vertical-align:middle;
}

/* Columna Observaciones (8.ª columna visible) */
#tabla td:nth-child(8){
    text-align:left;
}

tr:nth-child(even){
    background:#fafafa;
}

a{
    color:blue;
}

</style>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/><script src="https://unpkg.com/leaflet/dist/leaflet.js"></script></head>

<body>

<h2>Dashboard GOMA-GOPO</h2>

<div id="estado">Cargando datos...</div>

<div id="map" style="height:400px;margin-bottom:15px;"></div><table id="tabla">

<thead></thead>

<tbody></tbody>

</table>

<script>

const columnas=[0,1,3,4,5,6,10,15,44,19];
let mapa=L.map("map").setView([-34.6,-58.45],11);L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{maxZoom:19}).addTo(mapa);let markers=[];

const urlCSV="https://docs.google.com/spreadsheets/d/11sO2Vhm2wFxS818jzndZrfw7Ex6YZefYln0fevHXVEs/export?format=csv&gid=0";

Papa.parse(urlCSV,{

download:true,

skipEmptyLines:true,

complete:function(resultado){

console.log(resultado);

if(resultado.errors.length){

document.getElementById("estado").innerHTML="Error leyendo CSV";

console.log(resultado.errors);

return;

}

const datos=resultado.data;

document.getElementById("estado").innerHTML=
"Registros encontrados: "+(datos.length-1);

let encabezado="<tr>";

columnas.forEach(c=>{

let titulo=(c===44)?datos[0][16]:datos[0][c];
encabezado+="<th>"+(titulo||"")+"</th>";

});

encabezado+="</tr>";

document.querySelector("#tabla thead").innerHTML=encabezado;

crearFiltros(datos);

let cuerpo="";

for(let i=1;i<datos.length;i++){

let fila=datos[i];

if(fila.length==0) continue;

cuerpo+="<tr>";

columnas.forEach(c=>{

let valor=fila[c] || "";

if(c==19 && valor!=""){
const completo=valor;
if(completo.length>10){
 const corto=completo.substring(0,10)+"...";
 valor=`<span title="${completo}">${corto}</span>`;
}
}


if(c==44 && valor!=""){

let id=valor.match(/[-\w]{25,}/);

if(valor.includes("drive.google.com") && id){

let src=`https://drive.google.com/thumbnail?id=${id[0]}&sz=w200`;

valor=`<a href="${valor}" target="_blank"><img src="${src}" style="max-width:120px;max-height:120px"></a>`;

}else{

valor=`<a href="${valor}" target="_blank">Ver Foto</a>`;

}

}

cuerpo+="<td>"+valor+"</td>";

});

cuerpo+="</tr>";

}

document.querySelector("#tabla tbody").innerHTML=cuerpo;
markers.forEach(m=>mapa.removeLayer(m));markers=[];let bounds=[];
for(let i=1;i<datos.length;i++){let f=datos[i];let lat=parseFloat((f[39]||"").replace(",",".").trim());let lon=parseFloat((f[40]||"").replace(",",".").trim());if(!isNaN(lat)&&!isNaN(lon)){let mk=L.marker([lat,lon]).addTo(mapa);mk.bindPopup(`<b>${f[1]||""}</b><br>${f[15]||""}`);markers.push(mk);bounds.push([lat,lon]);}}
if(bounds.length)mapa.fitBounds(bounds,{padding:[20,20]});

},

error:function(err){

document.getElementById("estado").innerHTML="No se pudo descargar el CSV";

console.log(err);

}

});

function crearFiltros(datos){

const columnasFiltro=[1,3,4,10];

const fila=document.createElement("tr");

columnas.forEach(col=>{

const th=document.createElement("th");

if(columnasFiltro.includes(col)){

const s=document.createElement("select");

s.innerHTML="<option value=''>Todos</option>";

[...new Set(datos.slice(1).map(r=>r[col]||""))]
.filter(v=>v)
.sort()
.forEach(v=>{

const o=document.createElement("option");

o.value=v;

o.textContent=v;

s.appendChild(o);

});

s.onchange=filtrarTabla;

th.appendChild(s);

}

fila.appendChild(th);

});

document.querySelector("#tabla thead").appendChild(fila);

}

function filtrarTabla(){

const filtros=document.querySelectorAll("#tabla thead select");

const mapa={1:0,2:1,3:2,6:3};

document.querySelectorAll("#tabla tbody tr").forEach(tr=>{

let ok=true;

Object.entries(mapa).forEach(([col,i])=>{

const v=filtros[i]?.value||"";

if(v && tr.cells[col].textContent!==v) ok=false;

});

tr.style.display=ok?"":"none";

});

}

</script>

</body>
</html>
