<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Dashboard GOMA</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>

body{
    font-family:Arial,Helvetica,sans-serif;
    margin:20px;
    background:#d4a017;
}

h2{
    margin-bottom:20px;
}

#estado{
    margin-bottom:15px;
    font-weight:bold;
    color:#444;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
}

th{
    background:#dddddd;
    position:sticky;
    top:0;
}

th,td{
    border:1px solid #ccc;
    padding:6px;
    font-size:13px;
    text-align:center;
    vertical-align:middle;
}

tr:nth-child(even){
    background:#fafafa;
}

a{
    color:blue;
}

</style>

</head>

<body>

<h2>Dashboard</h2>

<div id="estado">Cargando datos...</div>

<table id="tabla">

<thead></thead>

<tbody></tbody>

</table>

<script>



const urlCSV="https://docs.google.com/spreadsheets/d/1KoUvKui4PJZ5XlmOOo9VIqrwXBNX8NIqZOtSVT1YXV8/export?format=csv&gid=0";

Papa.parse(urlCSV,{

download:true,

skipEmptyLines:true,

complete:function(resultado){

console.log(resultado);

if(resultado.errors.length){

document.getElementById("estado").innerHTML="Error leyendo CSV";

console.log(resultado.errors);

return;

}

const datos=resultado.data;

document.getElementById("estado").innerHTML=
"Registros encontrados: "+(datos.length-1);

const columnas=[0,1,2,3,4,5,6,8,10,15,16,19];

let encabezado="<tr>";

columnas.forEach(c=>{

encabezado+="<th>"+(datos[0][c]||"")+"</th>";

});

encabezado+="</tr>";

document.querySelector("#tabla thead").innerHTML=encabezado;
crearFiltros(datos);

let cuerpo="";

for(let i=1;i<datos.length;i++){

let fila=datos[i];

if(fila.length==0) continue;

cuerpo+="<tr>";

columnas.forEach(c=>{

let valor=fila[c] || "";

if(c==16 && valor!=""){


let id=valor.match(/[-\w]{25,}/);
if(valor.includes("drive.google.com") && id){
 let src=`https://drive.google.com/thumbnail?id=${id[0]}&sz=w200`;
 valor=`<a href="${valor}" target="_blank"><img src="${src}" style="max-width:120px;max-height:120px"></a>`;
}else{
 valor=`<a href="${valor}" target="_blank">Ver Foto</a>`;
}

}

cuerpo+="<td>"+valor+"</td>";

});

cuerpo+="</tr>";

}

document.querySelector("#tabla tbody").innerHTML=cuerpo;

},

error:function(err){

document.getElementById("estado").innerHTML="No se pudo descargar el CSV";

console.log(err);

}

});



function crearFiltros(datos){
 const columnasFiltro=[2,3,4,8,10];
 const fila=document.createElement("tr");
 columnas.forEach(col=>{
   const th=document.createElement("th");
   if(columnasFiltro.includes(col)){
     const s=document.createElement("select");
     s.innerHTML="<option value=''>Todos</option>";
     [...new Set(datos.slice(1).map(r=>r[col]||""))].filter(v=>v).sort().forEach(v=>{
       const o=document.createElement("option");
       o.value=v;o.textContent=v;s.appendChild(o);
     });
     s.onchange=filtrarTabla;
     th.appendChild(s);
   }
   fila.appendChild(th);
 });
 document.querySelector("#tabla thead").appendChild(fila);
}
function filtrarTabla(){
 const filtros=document.querySelectorAll("#tabla thead select");
 const mapa={2:0,3:1,4:2,7:3,8:4};
 document.querySelectorAll("#tabla tbody tr").forEach(tr=>{
   let ok=true;
   Object.entries(mapa).forEach(([col,i])=>{
     const v=filtros[i]?.value||"";
     if(v && tr.cells[col].textContent!==v) ok=false;
   });
   tr.style.display=ok?"":"none";
 });
}


</script>

</body>
</html>
